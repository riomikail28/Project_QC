version: '3.8'

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: qc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - qc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optimized Backend Application
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.optimized
    container_name: qc-backend
    environment:
      - FLASK_ENV=production
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=30
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://qc_user:${DB_PASSWORD}@postgres:5432/qc_db
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qc-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/qc/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (custom image with awscli for WAL streaming)
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres-aws
    container_name: qc-postgres
    environment:
      - POSTGRES_DB=qc_db
      - POSTGRES_USER=qc_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - S3_WAL_BUCKET=${S3_WAL_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - WALG_S3_PREFIX=${WALG_S3_PREFIX:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/wal:/var/lib/postgresql/wal_archive
      - ./scripts/wal_g_backup.sh:/wal_g_backup.sh:ro
      - ./scripts/wal_g_restore.sh:/wal_g_restore.sh:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql:ro
      - ./db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - qc-network
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qc_user -d qc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qc-redis
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - qc-network
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: qc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - qc-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: qc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - qc-network
    restart: unless-stopped

  # Log Aggregation with Loki
  loki:
    image: grafana/loki:latest
    container_name: qc-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - qc-network
    restart: unless-stopped

  # Log Collection
  promtail:
    image: grafana/promtail:latest
    container_name: qc-promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/qc:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - qc-network
    restart: unless-stopped

  # Backup Service
  backup:
    image: postgres:15-alpine
    container_name: qc-backup
    environment:
      - POSTGRES_DB=qc_db
      - POSTGRES_USER=qc_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST=postgres
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=30
      - PRESIGNED_UPLOAD_URL=${PRESIGNED_UPLOAD_URL}
      - PRESIGNED_WAL_URL=${PRESIGNED_WAL_URL:-}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qc-network
    restart: unless-stopped
    command: /bin/sh -c "while true; do sh /backup.sh; sleep 86400; done"

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.optimized
    container_name: qc-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://qc_user:${DB_PASSWORD}@postgres:5432/qc_db
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - redis:
        condition: service_healthy
      - postgres:
        condition: service_healthy
    networks:
      - qc-network
    restart: unless-stopped
    command: ["celery", "-A", "backend.workers.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
  # Celery Beat scheduler for periodic tasks
  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile.optimized
    container_name: qc-beat
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://qc_user:${DB_PASSWORD}@postgres:5432/qc_db
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - redis:
        condition: service_healthy
      - postgres:
        condition: service_healthy
    networks:
      - qc-network
    restart: unless-stopped
    command: ["celery", "-A", "backend.workers.celery_app.celery_app", "beat", "--loglevel=info"]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  qc-network:
    driver: bridge
