<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div>
            <h2>ASTRO QC</h2>
            <p id="currentDate">Memuat data...</p>
        </div>
        <div class="header-actions">
            <button id="adminBtn" class="notif-btn" onclick="window.location.href='admin_panel.html'" style="display: none; background: #f0f7ff; color: #0052cc; margin-right: 8px;"><i class="fas fa-cog"></i></button>
            <button class="notif-btn" onclick="window.location.href='alerts.html'"><i class="fas fa-bell"></i></button>
        </div>
    </header>

    <div class="health-card">
        <h3>Facility Health Score</h3>
        <div class="score-ring">
            <svg viewBox="0 0 100 100">
                <circle class="bg-circle" cx="50" cy="50" r="45"></circle>
                <circle id="scoreCircle" class="progress-circle" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
            </svg>
            <div class="score-value" id="healthScore">0</div>
        </div>
        <p style="color: var(--status-pass); font-weight: 700; margin-top: 8px;" id="healthStatus">SYSTEM STABLE</p>
    </div>

    <div class="metrics-row">
        <div class="metric-card">
            <div class="metric-value" id="activeBatches">0</div>
            <div class="metric-label">Active</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="criticalAlerts" style="color: var(--status-fail);">0</div>
            <div class="metric-label">Alerts</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="dailyScore">0</div>
            <div class="metric-label">Efficiency</div>
        </div>
    </div>

    <section class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 class="section-title" style="margin: 0;">Critical Monitoring</h3>
            <a href="alerts.html" style="color: var(--accent-blue); font-size: 13px; font-weight: 600;">View All</a>
        </div>
        <div id="recentAlerts">
            <div class="skeleton" style="height: 80px; margin-bottom: 12px; background: #eff6ff; border-radius: 16px;"></div>
        </div>
    </section>

    <!-- Speed Dial FAB -->
    <div id="fabContainer" style="position: fixed; bottom: 100px; right: 24px; z-index: 1001;">
        <button id="mainFab" class="fab" style="border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 0.3s;">
            <i class="fas fa-plus"></i>
        </button>
        <div id="fabMenu" style="display: none; flex-direction: column; gap: 16px; margin-bottom: 16px; position: absolute; bottom: 80px; right: 0;">
            <button onclick="openFindingModal()" style="width: 52px; height: 52px; border-radius: 50%; background: #ffffff; border: 1px solid var(--border-subtle); color: #ef4444; cursor: pointer; box-shadow: var(--shadow-md);" title="Lapor Temuan"><i class="fas fa-camera"></i></button>
            <button onclick="window.location.href='new_batch.html'" style="width: 52px; height: 52px; border-radius: 50%; background: #ffffff; border: 1px solid var(--border-subtle); color: var(--text-primary); cursor: pointer; box-shadow: var(--shadow-md);" title="Batch Baru"><i class="fas fa-box"></i></button>
            <button onclick="window.location.href='monitoring.html'" style="width: 52px; height: 52px; border-radius: 50%; background: #ffffff; border: 1px solid var(--border-subtle); color: var(--text-primary); cursor: pointer; box-shadow: var(--shadow-md);" title="Monitoring"><i class="fas fa-thermometer-half"></i></button>
        </div>
    </div>

    <!-- Modal Temuan -->
    <div id="findingModal" class="modal-overlay">
        <div class="modal-sheet">
            <div class="modal-drag-handle"></div>
            <div class="modal-header">
                <h3>Lapor Temuan QC</h3>
                <button onclick="closeFindingModal()" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <form id="findingForm">
                <div class="form-group">
                    <label class="input-label">Foto Temuan</label>
                    <div id="photoPreview" style="width: 100%; height: 200px; background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; overflow: hidden;">
                        <i class="fas fa-camera" style="font-size: 32px; color: #94a3b8; margin-bottom: 8px;"></i>
                        <span style="font-size: 13px; color: #94a3b8; font-weight: 600;">Klik untuk ambil foto</span>
                        <img id="previewImg" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <input type="file" id="findingPhoto" accept="image/*" capture="environment" style="display: none;">
                </div>
                <div class="form-group">
                    <label class="input-label">Alasan / Deskripsi</label>
                    <textarea id="findingReason" class="input-field" style="height: 120px; resize: none; padding-top: 12px;" placeholder="Jelaskan temuan Anda..."></textarea>
                </div>
                <button type="submit" class="btn-primary" id="submitFindingBtn">KIRIM LAPORAN</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-th-large"></i><span>Home</span></a>
        <a href="monitoring.html" class="nav-item"><i class="fas fa-thermometer-half"></i><span>Monitor</span></a>
        <a href="inspection.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Check</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.check()) window.location.href = 'login.html';
            
            const user = JSON.parse(localStorage.getItem("qc_user") || "{}");
            if (user.role === 'admin') {
                document.getElementById('adminBtn').style.display = 'flex';
            }

            document.getElementById('currentDate').innerText = Utils.formatDate(new Date());
            Dashboard.init();
        });

        // FAB Toggle
        const fab = document.getElementById('mainFab');
        const menu = document.getElementById('fabMenu');
        fab.addEventListener('click', () => {
            const isVisible = menu.style.display === 'flex';
            menu.style.display = isVisible ? 'none' : 'flex';
            fab.style.transform = isVisible ? 'rotate(0)' : 'rotate(45deg)';
        });

        // Finding Modal Logic
        const findingModal = document.getElementById('findingModal');
        const modalSheet = findingModal.querySelector('.modal-sheet');
        const findingForm = document.getElementById('findingForm');
        const photoInput = document.getElementById('findingPhoto');
        const photoPreview = document.getElementById('photoPreview');
        const previewImg = document.getElementById('previewImg');

        function openFindingModal() {
            menu.style.display = 'none';
            fab.style.transform = 'rotate(0)';
            findingModal.style.display = 'flex';
            setTimeout(() => modalSheet.classList.add('active'), 10);
        }

        function closeFindingModal() {
            modalSheet.classList.remove('active');
            setTimeout(() => findingModal.style.display = 'none', 400);
        }

        photoPreview.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (prev) => {
                    previewImg.src = prev.target.result;
                    previewImg.style.display = 'block';
                    photoPreview.querySelector('i').style.display = 'none';
                    photoPreview.querySelector('span').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        findingForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitFindingBtn');
            const reason = document.getElementById('findingReason').value;
            const photo = photoInput.files[0];

            if (!reason) return alert("Mohon isi alasan temuan");

            btn.disabled = true;
            btn.innerText = 'MENGIRIM...';

            try {
                const formData = new FormData();
                formData.append('reason', reason);
                if (photo) formData.append('photo', photo);
                formData.append('staff_id', JSON.parse(localStorage.getItem('qc_user')).id);

                await API.upload('/qc/findings', formData);
                
                alert("Laporan temuan berhasil dikirim!");
                closeFindingModal();
                findingForm.reset();
                previewImg.style.display = 'none';
                photoPreview.querySelector('i').style.display = 'block';
                photoPreview.querySelector('span').style.display = 'block';
            } catch (err) {
                alert("Gagal mengirim laporan: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'KIRIM LAPORAN';
            }
        });

        findingModal.addEventListener('click', (e) => {
            if (e.target === findingModal) closeFindingModal();
        });
    </script>
</body>
</html>
