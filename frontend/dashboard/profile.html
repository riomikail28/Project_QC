<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            padding: 24px 20px;
            text-align: center;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: var(--accent-gradient);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
            border: 4px solid #ffffff;
        }

        .info-card {
            background: #ffffff;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-top: 32px;
            text-align: left;
            box-shadow: var(--shadow-md);
        }

        .info-item {
            margin-bottom: 20px;
        }

        .info-item label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .info-item p {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-logout {
            width: 100%;
            padding: 16px;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--status-fail);
            border-radius: var(--radius-md);
            font-weight: 700;
            cursor: pointer;
            margin-top: 32px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--status-fail);
            color: white;
        }
    </style>
</head>

<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="dashboard.html"
                style="color: var(--text-primary); font-size: 18px; width: 44px; height: 44px; background: #ffffff; border: 1px solid var(--border-subtle); border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none;"><i
                    class="fas fa-chevron-left"></i></a>
            <h2 style="font-size: 20px; font-weight: 800;">USER PROFILE</h2>
        </div>
    </header>

    <div class="profile-container">
        <div class="avatar-circle">
            <i class="fas fa-user"></i>
        </div>
        <h2 id="displayUsername" style="margin-bottom: 4px;">Loading...</h2>
        <p id="displayRole" class="alert-status" style="display: inline-block; padding: 4px 16px;"></p>

        <div class="info-card">
            <div class="info-item">
                <label>Full Name</label>
                <p id="fullName">Astro Staff Member</p>
            </div>
            <div class="info-item">
                <label>Account ID</label>
                <p id="accountId" style="font-family: monospace; font-size: 13px; opacity: 0.7;"></p>
            </div>
            <div class="info-item" style="margin-bottom: 0;">
                <label>System Access</label>
                <p id="accessLevel">Standard Operations</p>
            </div>
        </div>

        <button class="btn-logout" onclick="Auth.logout()">LOGOUT SYSTEM</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Home</span></a>
        <a href="monitoring.html" class="nav-item"><i class="fas fa-thermometer-half"></i><span>Monitor</span></a>
        <a href="inspection.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Check</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.user();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('displayUsername').innerText = user.username.toUpperCase();
            document.getElementById('accountId').innerText = user.id;

            const roleEl = document.getElementById('displayRole');
            roleEl.innerText = user.role.toUpperCase();
            roleEl.className = 'alert-status ' + (user.role === 'admin' ? 'fail' : 'pass');

            document.getElementById('accessLevel').innerText = user.role === 'admin' ? 'Administrator (Full Control)' : 'Staff (Operations Only)';
        });
    </script>
</body>

</html>
