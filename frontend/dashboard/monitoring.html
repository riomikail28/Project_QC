<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/monitoring.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="dashboard.html" style="color: var(--text-primary); font-size: 18px; width: 44px; height: 44px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-chevron-left"></i></a>
            <div>
                <h2 style="font-size: 20px; font-weight: 800;">FACILITY MONITOR</h2>
                <p style="font-size: 12px; opacity: 0.7;">Real-time Temperature Tracking</p>
            </div>
        </div>
    </header>

    <div class="form-card">
        <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;">Log Suhu Baru</h3>
        
        <div class="input-group">
            <label class="input-label">Pilih Area / Unit</label>
            <select id="zoneSelect" class="input-field">
                <option value="Chiller Kitchen">Chiller Kitchen</option>
                <option value="Freezer Central">Freezer Central</option>
                <option value="Ambient Storage">Ambient Storage</option>
            </select>
        </div>

        <div class="input-group">
            <label class="input-label">Suhu Terukur (°C)</label>
            <input type="number" id="tempInput" class="input-field" step="0.1" placeholder="Contoh: 4.2">
        </div>

        <button id="submitTemp" class="btn-submit">SIMPAN DATA LOG</button>
    </div>

    <section class="section">
        <h3 class="section-title" style="margin-top: 12px;">Riwayat Log Terakhir</h3>
        <div id="monitoringList">
            <div class="skeleton" style="height: 80px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border-radius: 16px;"></div>
        </div>
    </section>

    <nav style="position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 1000;">
        <a href="dashboard.html" class="nav-item" style="text-decoration: none;"><i class="fas fa-th-large"></i></a>
        <a href="monitoring.html" class="nav-item active" style="text-decoration: none;"><i class="fas fa-thermometer-half"></i></a>
        <a href="inspection.html" class="nav-item" style="text-decoration: none;"><i class="fas fa-clipboard-check"></i></a>
        <a href="profile.html" class="nav-item" style="text-decoration: none;"><i class="fas fa-user-circle"></i></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/monitoring.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.check()) window.location.href = 'login.html';
            Monitoring.init();
        });

        document.getElementById('submitTemp').addEventListener('click', async () => {
            const zone = document.getElementById('zoneSelect').value;
            const temp = document.getElementById('tempInput').value;
            if (!temp) {
                UI.toast('Input suhu tidak boleh kosong', 'warning');
                return;
            }

            const btn = document.getElementById('submitTemp');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'MEMPROSES...';

            try {
                await Monitoring.submit(zone, parseFloat(temp));
                document.getElementById('tempInput').value = '';
                UI.toast('Data log berhasil disimpan!', 'success');
                btn.disabled = false;
                btn.innerText = originalText;
            } catch (err) {
                UI.toast('Gagal menyimpan data log', 'error');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
