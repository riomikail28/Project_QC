<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring Fasilitas | Intelligent QC</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/monitoring.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="app-container">
        <!-- Header -->
        <header class="header sticky-header">
            <div class="header-content">
                <a href="dashboard.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
                <div class="title-group">
                    <h2>Monitoring</h2>
                    <p id="currentRoomName">Pilih Ruangan</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="notif-btn" id="offlineIndicator" style="display:none; background: #fff7e6; color: #d46b08; border: none;">
                    <i class="fas fa-wifi-slash"></i>
                </button>
            </div>
        </header>

        <main class="content">
            <!-- Room Selection (Horizontal Scroll) -->
            <div class="room-selector-wrapper">
                <div class="room-selector" id="room-list">
                    <!-- Dynamic Chips -->
                </div>
            </div>

            <div class="container p-20">
                <div class="section-header">
                    <h3>Daftar Unit</h3>
                    <span class="device-count" id="deviceCount">0 Unit</span>
                </div>
                
                <!-- Device Grid -->
                <div class="device-grid" id="device-list">
                    <!-- Dynamic Cards -->
                </div>

                <!-- Recent Logs Section -->
                <div class="section mt-40">
                    <div class="section-header">
                        <h3>Log Terakhir</h3>
                        <a href="#" class="text-link">History</a>
                    </div>
                    <div id="recent-logs" class="modern-log-list">
                        <!-- Dynamic Logs -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Navigation Bar -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Home</span></a>
            <a href="monitoring.html" class="nav-item active"><i class="fas fa-thermometer-half"></i><span>Monitor</span></a>
            <a href="inspection.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Check</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
        </nav>
    </div>

    <!-- Bottom Sheet Modal -->
    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div id="log-modal" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content">
            <div class="sheet-header">
                <div class="sheet-title">
                    <i id="sheet-icon" class="fas fa-refrigerator"></i>
                    <h3 id="modal-title">Log Chiller</h3>
                </div>
                <button onclick="closeModal()" class="close-sheet"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="monitoring-form" class="sheet-form">
                <input type="hidden" id="selected-device-id">
                <input type="hidden" id="selected-room-id">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>Temperatur (°C)</label>
                        <div class="input-with-unit">
                            <input type="number" step="0.1" id="input-temp" placeholder="0.0" required>
                            <span class="unit">°C</span>
                        </div>
                    </div>

                    <div class="form-group" id="humidity-group">
                        <label>Kelembapan (%RH)</label>
                        <div class="input-with-unit">
                            <input type="number" step="1" id="input-rh" placeholder="0">
                            <span class="unit">%</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Temuan / Catatan</label>
                    <textarea id="input-reason" rows="2" placeholder="Tuliskan jika ada anomali atau temuan..."></textarea>
                </div>

                <div class="photo-section">
                    <label>Foto Temuan (Opsional)</label>
                    <div class="photo-grid">
                        <div class="photo-placeholder" onclick="triggerPhoto()">
                            <i class="fas fa-camera"></i>
                            <span>Ambil Foto</span>
                        </div>
                        <div id="photo-preview" class="photo-preview" style="display:none">
                            <img src="" id="preview-img">
                            <button type="button" class="remove-photo" onclick="removePhoto()"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none;">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-xl">Simpan Laporan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/monitoring.js"></script>
</body>
</html>
