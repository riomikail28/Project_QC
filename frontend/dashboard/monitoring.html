<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Fasilitas | Intelligent QC</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .room-selector {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .room-chip {
            padding: 10px 20px;
            background: white;
            border-radius: 30px;
            border: 1px solid #e0e0e0;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .room-chip.active {
            background: #0052cc;
            color: white;
            border-color: #0052cc;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
        }
        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }
        .device-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .device-card:active { transform: scale(0.95); }
        .device-icon {
            font-size: 24px;
            margin-bottom: 10px;
            color: #0052cc;
        }
        .device-name { font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .device-status { font-size: 12px; color: #666; }

        /* Form Modal */
        #log-modal {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 30px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            z-index: 1000;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        .photo-upload {
            border: 2px dashed #0052cc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: #0052cc;
            cursor: pointer;
            background: #f0f7ff;
        }
    </style>
</head>
<body class="bg-light">
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <header class="page-header">
            <div class="header-content">
                <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <h1>Monitoring Fasilitas</h1>
            </div>
        </header>

        <main class="content p-20">
            <!-- Room Selection -->
            <section class="room-selector" id="room-list">
                <!-- Chips will be loaded here -->
                <div class="room-chip active">PPIC</div>
                <div class="room-chip">Kitchen</div>
                <div class="room-chip">Grouper</div>
            </section>

            <!-- Device List -->
            <section class="device-grid" id="device-list">
                <!-- Devices will be loaded here -->
                <div class="loading-state">Memuat data fasilitas...</div>
            </section>

            <!-- Latest Logs -->
            <section class="section mt-30">
                <div class="section-header">
                    <h2>Log Terakhir</h2>
                    <a href="#" class="view-all">Lihat Semua</a>
                </div>
                <div id="recent-logs" class="log-list">
                    <!-- Logs will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Log Modal -->
    <div class="modal-overlay" id="overlay"></div>
    <div id="log-modal">
        <div class="modal-header">
            <h3 id="modal-title">Input Data Chiller</h3>
            <button onclick="closeModal()" class="close-btn"><i class="fas fa-times"></i></button>
        </div>
        <form id="monitoring-form">
            <input type="hidden" id="selected-device-id">
            <input type="hidden" id="selected-room-id">
            
            <div class="form-group">
                <label>Suhu (°C)</label>
                <input type="number" step="0.1" id="input-temp" placeholder="Contoh: 4.5" required>
            </div>

            <div class="form-group" id="humidity-group" style="display: none;">
                <label>Kelembapan (%RH)</label>
                <input type="number" step="1" id="input-rh" placeholder="Contoh: 65">
            </div>

            <div class="form-group">
                <label>Catatan / Temuan (Opsional)</label>
                <textarea id="input-reason" rows="3" placeholder="Sebutkan jika ada temuan atau alasan suhu tidak normal..."></textarea>
            </div>

            <div class="form-group">
                <label>Foto Temuan</label>
                <div class="photo-upload" onclick="triggerPhoto()">
                    <i class="fas fa-camera"></i> Ambil Foto
                </div>
                <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none;">
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-10">Simpan Data</button>
        </form>
    </div>

    <script src="../js/monitoring.js"></script>
</body>
</html>
