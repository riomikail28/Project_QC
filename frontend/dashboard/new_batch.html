<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Batch | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="dashboard.html" style="color: var(--text-primary); font-size: 18px; width: 44px; height: 44px; background: #ffffff; border: 1px solid var(--border-subtle); border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none;"><i class="fas fa-chevron-left"></i></a>
            <div>
                <h2 style="font-size: 20px; font-weight: 800;">NEW PRODUCTION</h2>
                <p style="font-size: 12px; opacity: 0.7;">Register Batch Record</p>
            </div>
        </div>
    </header>

    <div class="form-card">
        <form id="newBatchForm">
            <div class="form-group">
                <label class="input-label">Select Product</label>
                <select id="productId" class="input-field" required>
                    <option value="">Loading products...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="input-label">Batch Code</label>
                <input type="text" id="batchCode" class="input-field" placeholder="e.g. BATCH-20240507-001" required>
            </div>

            <div class="form-group">
                <label class="input-label">Production Date</label>
                <input type="date" id="productionDate" class="input-field" required>
            </div>

            <div class="form-group">
                <label class="input-label">Shift</label>
                <select id="shift" class="input-field">
                    <option value="Pagi">Shift Pagi (06:00 - 14:00)</option>
                    <option value="Siang">Shift Siang (14:00 - 22:00)</option>
                    <option value="Malam">Shift Malam (22:00 - 06:00)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="input-label">Foto Batch / Label Produk</label>
                <div id="batchPhotoBox" style="width: 100%; min-height: 150px; background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; overflow: hidden;">
                    <i class="fas fa-camera" style="font-size: 22px; color: #64748b;"></i>
                    <span style="font-size: 13px; color: #64748b; font-weight: 700;">Ambil / Upload Foto</span>
                </div>
                <input type="file" id="batchPhoto" accept="image/*" capture="environment" style="display:none">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 12px;">START INSPECTION</button>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.check()) window.location.href = 'login.html';
            
            // Set default date
            document.getElementById('productionDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('batchPhotoBox').addEventListener('click', () => document.getElementById('batchPhoto').click());
            document.getElementById('batchPhoto').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = event => {
                    document.getElementById('batchPhotoBox').innerHTML = `<img src="${event.target.result}" style="width:100%;height:180px;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            });
            
            // Load products
            try {
                const products = await API.get('/products');
                const select = document.getElementById('productId');
                select.innerHTML = '<option value="">Select Product</option>';
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.product_code;
                    opt.textContent = `${p.product_code} - ${p.product_name}`;
                    select.appendChild(opt);
                });
            } catch (err) {
                console.error('Failed to load products');
            }
        });

        document.getElementById('newBatchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'CREATING...';

            const formData = new FormData();
            formData.append('product_id', document.getElementById('productId').value);
            formData.append('batch_code', document.getElementById('batchCode').value);
            formData.append('production_date', document.getElementById('productionDate').value);
            formData.append('shift', document.getElementById('shift').value);
            formData.append('operator_id', Auth.user().id);
            const photo = document.getElementById('batchPhoto').files[0];
            if (photo) formData.append('photo', photo);

            try {
                const res = await API.upload('/batch/create', formData);
                if (res.success) {
                    window.location.href = `batch_detail.html?id=${res.batch.id}`;
                } else {
                    throw new Error(res.error || 'Unknown error');
                }
            } catch (err) {
                alert('Gagal membuat batch: ' + err.message);
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
