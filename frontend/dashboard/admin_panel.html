<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel | Intelligent QC</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-tabs {
            display: flex;
            background: white;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #0052cc;
            color: white;
        }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        .data-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-table th { background: #f8f9fa; font-weight: 600; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-sm { padding: 8px 12px; font-size: 12px; }
        .btn-danger { background: #ff4d4f; color: white; }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="app-container">
        <header class="page-header">
            <div class="header-content">
                <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <h1>Admin Control Panel</h1>
            </div>
        </header>

        <main class="content p-20">
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showSection('analytics')">Analytics</button>
                <button class="tab-btn" onclick="showSection('staff')">Staff</button>
                <button class="tab-btn" onclick="showSection('facilities')">Fasilitas</button>
            </div>

            <!-- Analytics Section -->
            <section id="section-analytics" class="admin-section active">
                <div class="chart-container">
                    <h3>Tren Suhu Harian</h3>
                    <canvas id="tempTrendChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Distribusi Alert (Normal vs Abnormal)</h3>
                    <canvas id="alertDistChart"></canvas>
                </div>
            </section>

            <!-- Staff Section -->
            <section id="section-staff" class="admin-section">
                <div class="section-header">
                    <h2>Daftar Staf</h2>
                    <button class="btn btn-primary" onclick="openAddStaff()">+ Tambah Staf</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Role</th>
                            <th>Username</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table-body">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>

            <!-- Facilities Section -->
            <section id="section-facilities" class="admin-section">
                <div class="section-header">
                    <h2>Daftar Ruangan</h2>
                    <button class="btn btn-primary" onclick="openAddRoom()">+ Tambah Ruangan</button>
                </div>
                <div id="room-manage-list">
                    <!-- Rooms and their devices will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modals for adding data (simplified for now) -->
    <script src="../js/admin_panel.js"></script>
</body>
</html>
