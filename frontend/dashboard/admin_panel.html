<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Panel | Intelligent QC</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin_panel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div class="app-container">
        <header class="page-header">
            <div class="header-content">
                <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
                <h1>Admin Control Panel</h1>
            </div>
        </header>

        <main class="content p-20">
            <div class="admin-tabs">
                <button class="tab-btn active" data-section="analytics" onclick="showSection('analytics')">Analytics</button>
                <button class="tab-btn" data-section="staff" onclick="showSection('staff')">Staff</button>
                <button class="tab-btn" data-section="facilities" onclick="showSection('facilities')">Fasilitas</button>
            </div>

            <!-- Analytics Section -->
            <section id="section-analytics" class="admin-section active">
                <div class="chart-container">
                    <h3>Tren Suhu Harian</h3>
                    <canvas id="tempTrendChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Distribusi Alert (Normal vs Abnormal)</h3>
                    <canvas id="alertDistChart"></canvas>
                </div>
            </section>

            <!-- Staff Section -->
            <section id="section-staff" class="admin-section">
                <div class="section-header">
                    <h2>Daftar Staf</h2>
                    <button class="btn btn-primary" onclick="openAddStaff()">+ Tambah Staf</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Role</th>
                            <th>Username</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table-body">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>

            <!-- Facilities Section -->
            <section id="section-facilities" class="admin-section">
                <div class="section-header">
                    <h2>Daftar Ruangan</h2>
                    <button class="btn btn-primary" onclick="openAddRoom()">+ Tambah Ruangan</button>
                </div>
                <div id="room-manage-list">
                    <!-- Rooms and their devices will be loaded here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h3 id="modal-title">Tambah Staf</h3>
                <button onclick="closeModal()" class="modal-close"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="admin-form">
                <div id="modal-form-content">
                    <!-- Dynamic form fields -->
                </div>
                <button type="submit" class="btn-primary admin-submit">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <div id="admin-toast" class="admin-toast" role="status" aria-live="polite"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin_panel.js"></script>
</body>
</html>
