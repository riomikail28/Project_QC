<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Central | Intelligent Traceability</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-card">
        <div class="login-icon">
            <i class="fas fa-industry"></i>
        </div>
        <h1 class="login-title">QC Central</h1>
        <p class="login-subtitle">Intelligent Traceability System</p>

        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">Username atau password salah</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" class="form-input" placeholder="Masukkan username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-input" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <span>Sign In</span>
            </button>
        </form>

        <div class="login-footer">
            PT Astro Teknologi Indonesia<br>
            Central Kitchen v2.0
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            errorMsg.classList.remove('show');

            try {
                const success = await Auth.login(username, password);
                if (success) {
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Invalid credentials');
                }
            } catch (err) {
                document.getElementById('errorText').innerText = err.message || 'Login gagal';
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });

        // Auto redirect jika sudah login
        if (Auth.check()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
