<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #0d1425 0%, #050b18 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
            text-align: center;
        }
        .logo-box {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 22px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: var(--glow-blue);
        }
        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            color: white;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: var(--glow-blue);
        }
        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-box">
            <i class="fas fa-microchip"></i>
        </div>
        <div class="login-header">
            <h1>AstroQC</h1>
            <p>Intelligent Traceability System</p>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter username">
        </div>
        <div class="form-group" style="margin-bottom: 32px;">
            <label>Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••">
        </div>
        <button id="loginBtn" class="btn-login">LOGIN SYSTEM</button>
        <p style="margin-top: 24px; font-size: 12px; color: var(--text-muted);">
            &copy; 2026 PT Astro Teknologi Indonesia
        </p>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = 'AUTHENTICATING...';

            try {
                const res = await Auth.login(user, pass);
                if (res.token) {
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Invalid credentials');
                }
            } catch (err) {
                UI.toast('Login Gagal: Periksa kembali kredensial Anda', 'error');
                btn.disabled = false;
                btn.innerText = 'LOGIN SYSTEM';
            }
        });
    </script>
</body>
</html>
