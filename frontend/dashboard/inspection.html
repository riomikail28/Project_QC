<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Inspection | QC Central Kitchen</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/inspection.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--bg-primary);">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <a href="dashboard.html" style="color: var(--text-primary); font-size: 18px;"><i class="fas fa-chevron-left"></i></a>
            <div>
                <h2>QC Traceability</h2>
                <p>Batch Inspection & Tracking</p>
            </div>
        </div>
    </header>

    <div class="metrics-row" style="margin-top: 16px;">
        <div class="metric-card" onclick="window.location.href='new_batch.html'" style="cursor: pointer; border: 2px dashed var(--accent-blue); background: var(--accent-blue-soft);">
            <div class="metric-value"><i class="fas fa-plus"></i></div>
            <div class="metric-label" style="color: var(--accent-blue);">New Batch</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="runningCount">0</div>
            <div class="metric-label">Running</div>
        </div>
        <div class="metric-card">
            <div class="metric-value" id="passedCount">0</div>
            <div class="metric-label">Passed</div>
        </div>
    </div>

    <section class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 class="section-title" style="margin-bottom: 0;">Active Batches</h3>
            <div style="font-size: 12px; color: var(--text-muted);">Swipe to see details</div>
        </div>
        <div id="batchList">
            <div class="skeleton" style="height: 80px; margin-bottom: 12px; background: #eee; border-radius: 16px;"></div>
        </div>
    </section>

    <nav style="position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: white; border-top: 1px solid var(--border-subtle); display: flex; justify-content: space-around; align-items: center; z-index: 1000;">
        <a href="dashboard.html" style="color: var(--text-muted); text-decoration: none; font-size: 20px;"><i class="fas fa-th-large"></i></a>
        <a href="monitoring.html" style="color: var(--text-muted); text-decoration: none; font-size: 20px;"><i class="fas fa-thermometer-half"></i></a>
        <a href="inspection.html" style="color: var(--accent-blue); text-decoration: none; font-size: 20px;"><i class="fas fa-clipboard-check"></i></a>
        <a href="profile.html" style="color: var(--text-muted); text-decoration: none; font-size: 20px;"><i class="fas fa-user"></i></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/inspection.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.check()) window.location.href = 'login.html';
            Inspection.init();
            UI.toast('Menampilkan batch aktif', 'info');
        });
    </script>
</body>
</html>
