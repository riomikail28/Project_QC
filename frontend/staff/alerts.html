<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alerts | ASTRO QC Enterprise</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/alerts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="top-navbar">
        <a class="nav-brand" href="dashboard.html">
            <div class="logo-icon"><i class="fas fa-bell"></i></div>
            <div>
                <div class="brand-name">Active Alerts</div>
                <div class="brand-sub">Corrective Actions</div>
            </div>
        </a>
        <div class="nav-actions">
            <button class="nav-btn" onclick="loadAlerts()" aria-label="Refresh alerts"><i class="fas fa-rotate"></i></button>
            <div class="user-avatar">QC</div>
        </div>
    </header>

    <main class="app-shell page-grid">
        <section class="glass-card" style="padding:22px">
            <span class="eyebrow">ASTRO QC Alert Center</span>
            <h1 style="margin:8px 0;font-size:clamp(28px,5vw,42px)">Alert aktif dan tindakan korektif.</h1>
            <p style="margin:0;color:var(--muted)">Halaman ini adalah fallback jika alert dibuka langsung. Dari dashboard, alert sekarang muncul sebagai drawer tanpa pindah halaman.</p>
        </section>

        <section class="panel-card">
            <div class="section-header">
                <h3 class="section-title">Alert List</h3>
                <span class="status-badge warning"><i class="fas fa-triangle-exclamation"></i>Live</span>
            </div>
            <div id="alertList" class="alert-drawer-body">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Home</span></a>
        <a href="monitoring.html" class="nav-item"><i class="fas fa-temperature-half"></i><span>Monitor</span></a>
        <a href="inspection.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Check</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        function getSOPAction(zone) {
            if (zone && zone.includes('Chiller')) return 'Pindahkan produk ke chiller cadangan dan periksa kompresor.';
            if (zone && zone.includes('Freezer')) return 'Jangan buka pintu freezer. Hubungi maintenance segera.';
            return 'Periksa integritas batch dan lakukan pengecekan ulang parameter QC.';
        }

        async function loadAlerts() {
            if (!Auth.check()) window.location.href = 'login.html';
            const container = document.getElementById('alertList');
            container.innerHTML = '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>';
            try {
                const alerts = await API.get('/alerts');
                if (!alerts || alerts.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle"></i>
                            <h4>Semua sistem normal</h4>
                            <p>Tidak ada alert aktif.</p>
                        </div>
                    `;
                    return;
                }
                container.innerHTML = alerts.map(alert => `
                    <div class="alert-card fail" style="flex-direction:column;align-items:flex-start">
                        <div style="display:flex;align-items:center;gap:12px;width:100%">
                            <div class="alert-icon"><i class="fas fa-triangle-exclamation"></i></div>
                            <div class="alert-info">
                                <h4>${alert.zone || 'Batch Violation'}</h4>
                                <p>${Utils.formatTime(alert.created_at)} - Value: ${alert.temperature_c || alert.description || '-'}</p>
                            </div>
                            <span class="alert-status fail">Critical</span>
                        </div>
                        <div class="alert-action-box">
                            <strong>Tindakan Korektif:</strong><br>${getSOPAction(alert.zone)}
                        </div>
                        <button class="alert-resolve-btn" onclick="resolve('${alert.id}')">Tandai Selesai</button>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-cloud-exclamation"></i>
                        <h4>Gagal memuat alert</h4>
                        <p>Coba refresh beberapa saat lagi.</p>
                    </div>
                `;
            }
        }

        async function resolve(id) {
            if (!confirm('Tandai alert ini sebagai selesai?')) return;
            try {
                await API.post(`/alerts/${id}/resolve`, {});
                loadAlerts();
            } catch (err) {
                alert('Gagal menyelesaikan alert');
            }
        }

        document.addEventListener('DOMContentLoaded', loadAlerts);
    </script>
</body>
</html>
