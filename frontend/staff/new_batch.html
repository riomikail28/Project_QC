<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buat Batch | ASTRO QC</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/new_batch.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="new-batch-header-content">
            <a href="dashboard.html" class="new-batch-back"><i class="fas fa-chevron-left"></i></a>
            <div>
                <h2 class="new-batch-title">Buat Batch</h2>
                <p class="new-batch-subtitle">Data awal produksi</p>
            </div>
        </div>
    </header>

    <div class="form-card">
        <form id="newBatchForm">
            <div class="form-group">
                <label class="input-label">Pilih Produk</label>
                <select id="productId" class="input-field" required>
                    <option value="">Memuat produk...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="input-label">Kode Batch</label>
                <input type="text" id="batchCode" class="input-field" placeholder="Batch code otomatis" readonly>
                <small class="batch-code-helper">Format otomatis: SKU-YYYYMMDD-urutan pemasakan.</small>
            </div>

            <div class="form-group">
                <label class="input-label">Tanggal Produksi</label>
                <input type="date" id="productionDate" class="input-field" required>
            </div>

            <div class="form-group">
                <label class="input-label">Pemasakan ke</label>
                <input type="number" id="batchSequence" class="input-field" placeholder="Otomatis" readonly>
            </div>

            <div class="form-group">
                <label class="input-label">Qty</label>
                <input type="number" step="0.01" id="quantity" class="input-field" placeholder="Jumlah produksi">
            </div>

            <div class="form-group">
                <label class="input-label">Shift</label>
                <select id="productionShift" class="input-field">
                    <option value="">Pilih shift</option>
                    <option value="Pagi">Pagi</option>
                    <option value="Siang">Siang</option>
                    <option value="Malam">Malam</option>
                </select>
            </div>

            <div class="form-group">
                <label class="input-label">Cook</label>
                <input type="text" id="cookName" class="input-field" placeholder="Nama cook">
            </div>

            <div class="optional-parameter-card">
                <div>
                    <h3>Parameter Opsional</h3>
                    <p>Opsional, isi hanya jika produk membutuhkan pengecekan pH, Brix, atau TDS.</p>
                </div>
                <div class="parameter-grid">
                    <div class="form-group">
                        <label class="input-label" for="phValue">pH</label>
                        <input type="number" step="0.01" id="phValue" class="input-field" placeholder="pH">
                        <small class="parameter-standard" id="phStandard"></small>
                    </div>
                    <div class="form-group">
                        <label class="input-label" for="brixValue">Brix</label>
                        <input type="number" step="0.01" id="brixValue" class="input-field" placeholder="Brix">
                        <small class="parameter-standard" id="brixStandard"></small>
                    </div>
                    <div class="form-group">
                        <label class="input-label" for="tdsValue">TDS</label>
                        <input type="number" step="0.01" id="tdsValue" class="input-field" placeholder="TDS">
                        <small class="parameter-standard" id="tdsStandard"></small>
                    </div>
                </div>
                <div class="form-group">
                    <label class="input-label" for="parameterNotes">Catatan</label>
                    <textarea id="parameterNotes" class="input-field" rows="3" placeholder="Catatan parameter opsional"></textarea>
                </div>
            </div>

            <div id="newBatchMessage" class="new-batch-message" role="status" aria-live="polite" hidden></div>
            <button type="submit" class="btn-primary new-batch-submit">Lanjut QC Check</button>
        </form>
    </div>

    <div class="new-batch-quick-actions" data-quick-actions>
        <div class="new-batch-quick-menu" data-quick-actions-menu hidden>
            <button class="new-batch-quick-item" data-quick-action="photo" type="button"><span>QC Temuan</span><i class="fas fa-camera"></i></button>
            <button class="new-batch-quick-item" data-quick-action="batch" type="button"><span>Buat Batch</span><i class="fas fa-plus"></i></button>
            <button class="new-batch-quick-item" data-quick-action="qc" type="button"><span>QC Check</span><i class="fas fa-clipboard-check"></i></button>
            <button class="new-batch-quick-item" data-quick-action="monitoring" type="button"><span>Monitoring</span><i class="fas fa-temperature-half"></i></button>
        </div>
        <button class="new-batch-fab" data-quick-actions-trigger type="button" aria-label="Quick actions" aria-expanded="false"><i class="fas fa-plus"></i></button>
    </div>

    <script src="../js/image-compression.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/performance-optimized.js"></script>
    <script src="../js/quick-actions.js"></script>
    <script>
        let productRows = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.check()) window.location.href = 'login.html';
            
            // Set default date
            document.getElementById('productionDate').value = new Date().toISOString().split('T')[0];
            
            // Load products
            try {
                const products = await API.get('/products');
                productRows = products || [];
                const select = document.getElementById('productId');
                select.innerHTML = '<option value="">Pilih produk</option>';
                products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.product_code;
                    opt.textContent = `${p.product_code} - ${p.product_name}`;
                    opt.dataset.product = JSON.stringify(p);
                    select.appendChild(opt);
                });
                select.addEventListener('change', () => {
                    const selected = productRows.find(p => p.product_code === select.value || p.id === select.value);
                    renderStandards(selected || null);
                    refreshBatchPreview();
                });
            } catch (err) {
                console.error('Failed to load products');
            }
            document.getElementById('productionDate').addEventListener('change', refreshBatchPreview);
            refreshBatchPreview();
        });

        async function refreshBatchPreview() {
            const productId = document.getElementById('productId').value;
            const productionDate = document.getElementById('productionDate').value;
            const batchCode = document.getElementById('batchCode');
            const sequence = document.getElementById('batchSequence');
            if (!productId || !productionDate) {
                batchCode.value = '';
                sequence.value = '';
                return;
            }
            try {
                batchCode.value = 'Menghitung...';
                const res = await API.get(`/batch/next-code?product_id=${encodeURIComponent(productId)}&production_date=${encodeURIComponent(productionDate)}`);
                const data = res.data || {};
                batchCode.value = data.batch_code || '';
                sequence.value = data.batch_sequence || '';
            } catch (err) {
                const selected = productRows.find(p => p.product_code === productId || p.id === productId);
                const sku = (selected && selected.product_code) || productId || 'BATCH';
                batchCode.value = `${sku}-${productionDate.replaceAll('-', '')}-001`;
                sequence.value = '1';
            }
        }

        function renderStandards(product) {
            const helpers = {
                phStandard: product && product.ph_min != null && product.ph_max != null ? `Standar pH: ${product.ph_min} - ${product.ph_max}` : '',
                brixStandard: product && product.brix_min != null && product.brix_max != null ? `Standar Brix: ${product.brix_min} - ${product.brix_max} %` : '',
                tdsStandard: product && product.tds_min != null && product.tds_max != null ? `Standar TDS: ${product.tds_min} - ${product.tds_max}` : ''
            };
            Object.entries(helpers).forEach(([id, text]) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            });
        }

        function optionalNumber(id) {
            const value = document.getElementById(id).value;
            return value === '' ? undefined : Number(value);
        }

        function showBatchMessage(message, type = 'error') {
            const el = document.getElementById('newBatchMessage');
            if (!el) return;
            el.textContent = message;
            el.className = `new-batch-message ${type}`;
            el.hidden = false;
        }

        function clearBatchMessage() {
            const el = document.getElementById('newBatchMessage');
            if (!el) return;
            el.textContent = '';
            el.hidden = true;
        }

        function batchErrorMessage(error) {
            const detail = error && error.data && error.data.details;
            if (detail && Array.isArray(detail.unknown_fields)) {
                return 'Data batch tidak valid. Muat ulang halaman lalu coba lagi.';
            }
            return (error && error.message) || 'Batch belum bisa dibuat. Periksa data lalu coba lagi.';
        }

        document.getElementById('newBatchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Membuat...';
            clearBatchMessage();

            const payload = {
                product_id: document.getElementById('productId').value,
                production_date: document.getElementById('productionDate').value,
                batch_sequence: document.getElementById('batchSequence').value || undefined,
                quantity: optionalNumber('quantity'),
                production_shift: document.getElementById('productionShift').value,
                cook_name: document.getElementById('cookName').value.trim(),
                operator_id: Auth.user().id,
                notes: document.getElementById('parameterNotes').value
            };
            const ph = optionalNumber('phValue');
            const brix = optionalNumber('brixValue');
            const tds = optionalNumber('tdsValue');
            if (ph !== undefined) payload.ph_value = ph;
            if (brix !== undefined) payload.brix_value = brix;
            if (tds !== undefined) payload.tds_value = tds;

            try {
                const res = await API.post('/batch/create', payload);
                if (res.success) {
                    window.location.href = `inspection.html?batch_id=${encodeURIComponent(res.batch.id)}&batch_code=${encodeURIComponent(res.batch.batch_code || '')}`;
                } else {
                    throw new Error(res.error || 'Unknown error');
                }
            } catch (err) {
                showBatchMessage(batchErrorMessage(err));
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
