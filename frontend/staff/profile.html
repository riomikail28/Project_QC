<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | ASTRO QC Enterprise</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="top-navbar">
        <a class="nav-brand" href="dashboard.html">
            <div class="logo-icon"><i class="fas fa-user-shield"></i></div>
            <div>
                <div class="brand-name">Profile</div>
                <div class="brand-sub">Staff Access</div>
            </div>
        </a>
        <nav class="desktop-nav" aria-label="Desktop navigation">
            <a href="dashboard.html">Home</a>
            <a href="monitoring.html">Monitor</a>
            <a href="inspection.html">Check</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="/admin/">Admin</a>
        </nav>
        <div class="nav-actions">
            <button class="nav-btn" aria-label="Settings"><i class="fas fa-gear"></i></button>
            <div class="user-avatar" id="avatarSmall">QC</div>
        </div>
    </header>

    <main class="app-shell page-grid">
        <section class="glass-card profile-cover">
            <div class="profile-main">
                <label class="avatar-circle" title="Upload avatar">
                    <i class="fas fa-user"></i>
                    <input type="file" accept="image/*" hidden>
                </label>
                <div>
                    <span class="eyebrow">ASTRO QC Staff</span>
                    <h1 id="displayUsername">Loading...</h1>
                    <span id="displayRole" class="alert-status pass">STAFF</span>
                </div>
            </div>
        </section>

        <section class="profile-grid">
            <div class="glass-card profile-info"><label>Full Name</label><p id="fullName">Astro Staff Member</p></div>
            <div class="glass-card profile-info"><label>Shift Info</label><p>Shift A - 07:00</p></div>
            <div class="glass-card profile-info"><label>Department</label><p>QC Kitchen</p></div>
            <div class="glass-card profile-info"><label>Last Login</label><p id="lastLogin">Today</p></div>
        </section>

        <section class="panel-card">
            <div class="section-header">
                <h3 class="section-title">Activity Statistics</h3>
                <span class="status-badge success"><span class="online-dot"></span>Online</span>
            </div>
            <div class="profile-grid">
                <div class="mini-stat"><span class="card-label">QC Submitted</span><strong>128</strong></div>
                <div class="mini-stat"><span class="card-label">Photo Evidence</span><strong>84</strong></div>
                <div class="mini-stat"><span class="card-label">Temp Logs</span><strong>212</strong></div>
                <div class="mini-stat"><span class="card-label">Accuracy</span><strong>99%</strong></div>
            </div>
        </section>

        <section class="menu-grid">
            <button class="menu-item"><span class="alert-icon"><i class="fas fa-pen"></i></span><strong>Edit profile</strong></button>
            <button class="menu-item"><span class="alert-icon"><i class="fas fa-lock"></i></span><strong>Change password</strong></button>
            <button class="menu-item"><span class="alert-icon"><i class="fas fa-bell"></i></span><strong>Notification settings</strong></button>
            <button class="menu-item"><span class="alert-icon"><i class="fas fa-palette"></i></span><strong>Theme settings</strong></button>
            <button class="menu-item logout-danger" onclick="Auth.logout()"><span class="alert-icon"><i class="fas fa-right-from-bracket"></i></span><strong>Logout</strong></button>
        </section>

        <section class="panel-card">
            <div class="profile-info">
                <label>Account ID</label>
                <p id="accountId" style="font-family:monospace;color:var(--muted)"></p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Home</span></a>
        <a href="monitoring.html" class="nav-item"><i class="fas fa-temperature-half"></i><span>Monitor</span></a>
        <a href="inspection.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Check</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.user();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            const initials = user.username.substring(0, 2).toUpperCase();
            document.getElementById('displayUsername').innerText = user.username.toUpperCase();
            document.getElementById('avatarSmall').innerText = initials;
            document.getElementById('accountId').innerText = user.id;
            document.getElementById('lastLogin').innerText = new Date().toLocaleString('id-ID');
            const roleEl = document.getElementById('displayRole');
            roleEl.innerText = user.role.toUpperCase();
            roleEl.className = 'alert-status ' + (user.role === 'admin' ? 'fail' : 'pass');
        });
    </script>
</body>
</html>
