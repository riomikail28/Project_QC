<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC Check | ASTRO QC Enterprise</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/qc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="top-navbar">
        <a class="nav-brand" href="dashboard.html">
            <div class="logo-icon"><i class="fas fa-clipboard-check"></i></div>
            <div>
                <div class="brand-name">QC Check</div>
                <div class="brand-sub">Quick Staff Input</div>
            </div>
        </a>
        <nav class="desktop-nav" aria-label="Desktop navigation">
            <a href="dashboard.html">Home</a>
            <a href="monitoring.html">Monitor</a>
            <a href="inspection.html" class="active">Check</a>
            <a href="profile.html">Profile</a>
            <a href="/admin/" data-admin-only hidden>Admin</a>
        </nav>
        <div class="nav-actions">
            <button class="nav-btn" onclick="window.location.href='new_batch.html'" aria-label="New batch"><i class="fas fa-plus"></i></button>
            <div class="user-avatar">QC</div>
        </div>
    </header>

    <main class="app-shell page-grid simple-qc-page">
        <section class="qc-layout qc-layout-single">
            <div class="panel-card form-stack simple-qc-card">
                <div class="section-header">
                    <div>
                        <h1 class="simple-qc-title">QC Check</h1>
                        <p class="simple-qc-subtitle">Satu SKU, satu pengecekan, satu submit.</p>
                    </div>
                </div>
                <div class="simple-field">
                    <label for="qcSku">SKU / Barcode</label>
                    <input class="input-field input-large" id="qcSku" placeholder="Scan atau ketik SKU" autocomplete="off">
                </div>
                <div class="simple-field">
                    <label>Status QC</label>
                    <div class="qc-status-selector" role="radiogroup" aria-label="Status QC">
                        <button class="qc-status-option active" type="button" data-status="pass">PASS</button>
                        <button class="qc-status-option" type="button" data-status="hold">HOLD</button>
                        <button class="qc-status-option" type="button" data-status="fail">FAIL</button>
                    </div>
                </div>
                <div class="upload-zone simple-upload" onclick="document.getElementById('qcPhoto').click()">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <strong>Upload foto evidence</strong>
                    <span>Opsional, JPG/PNG/WEBP maksimal 10MB.</span>
                    <input id="qcPhoto" type="file" accept="image/jpeg,image/png,image/webp" hidden>
                </div>
                <div class="simple-field">
                    <label for="qcNotes">Catatan opsional</label>
                    <textarea class="input-field simple-notes" id="qcNotes" rows="4" placeholder="Contoh: kemasan penyok, warna tidak standar, atau catatan lain"></textarea>
                </div>
                <div class="simple-field">
                    <label for="qcTemp">Suhu opsional</label>
                    <input class="input-field" id="qcTemp" type="number" step="0.1" placeholder="0.0 C">
                </div>
                <button class="btn-primary simple-submit" id="submitQcBtn" type="button"><i class="fas fa-paper-plane"></i>Submit QC</button>
                <p class="simple-qc-message" id="qcSubmitMessage" aria-live="polite"></p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Home</span></a>
        <a href="monitoring.html" class="nav-item"><i class="fas fa-temperature-half"></i><span>Monitor</span></a>
        <a href="inspection.html" class="nav-item active"><i class="fas fa-clipboard-check"></i><span>QC</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </nav>

    <script src="../js/config.js"></script>
    <script type="module" src="../js/camera-module.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-mobile.js"></script>
    <script src="../js/inspection.js"></script>
    <script src="../js/mobile-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            if (!Auth.check()) window.location.href = 'login.html';
            Auth.refreshSessionRole();
            ['qcSku','qcTemp','qcNotes'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                const saved = localStorage.getItem(id);
                if (saved) el.value = saved;
                el.addEventListener('input', () => localStorage.setItem(id, el.value));
            });
            Inspection.init();
        });
    </script>
</body>
</html>
