<!DOCTYPE html>
<html lang="en" class="forced-mobile">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCP Inspection | QC Central Kitchen</title>
    <meta name="description" content="Halaman CCP Inspection untuk aplikasi Quality Control (QC) dan Ketertelusuran Produksi Dapur Sentral Enterprise.">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/monitoring.css">
    <link rel="stylesheet" href="../css/inspection.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body class="forced-mobile">
    <header class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <a id="backBtn" href="#" style="color: white; font-size: 18px;"><i class="fas fa-chevron-left"></i></a>
            <div>
                <h2 id="stageTitle">CCP Stage</h2>
                <p id="batchCodeLabel">Loading...</p>
            </div>
        </div>
    </header>

    <div class="form-card">
        <h3 id="stageInstruction">Melakukan pengecekan parameter QC</h3>
        
        <div id="dynamicFields">
            <!-- Dynamic parameters will be injected here -->
        </div>

        <div class="photo-upload" onclick="UI.showPhotoSourcePicker(document.getElementById('photoInput'))">
            <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp" multiple>
            <div id="photoPreview" style="display: none; margin-bottom: 12px; position: relative;">
                <img id="previewImg" src="" style="width: 100%; border-radius: 8px; border: 1px solid var(--border-subtle);">
                <div id="multiPhotoBadge" style="display:none; position:absolute; top:-5px; right:-5px; background:var(--accent-blue); color:white; border-radius:50%; width:24px; height:24px; font-size:12px; display:flex; align-items:center; justify-content:center; border:2px solid white; z-index:10;"></div>
            </div>
            <div id="uploadPrompt">
                <i class="fas fa-camera" style="font-size: 24px; margin-bottom: 8px;"></i>
                <p id="photoPromptText">Ambil Foto Bukti (CCP Evidence)</p>
                <small id="photoCompressionStatus" style="display:block; margin-top:6px; color:var(--text-muted);">Foto akan dikompres otomatis sebelum dikirim.</small>
            </div>
        </div>

        <button id="ocrBtn" class="btn-submit" style="background: var(--bg-card); border: 1px solid var(--border-active); color: var(--accent-blue); margin-top: 12px; display: none;">
            <i class="fas fa-magic"></i> Jalankan OCR (Ekstrak Teks)
        </button>

        <button id="submitBtn" class="btn-submit" style="margin-top: 20px;">Submit Inspection</button>
    </div>

    <div id="validationResult" style="display: none;"></div>

    <script src="../js/config.js"></script>
    <script type="module" src="../js/camera-module.js"></script>
    <script src="../js/image-compression.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ccp.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const batchId = params.get('batch_id');
        const stageNum = parseInt(params.get('stage'));

        document.getElementById('backBtn').href = `batch_detail.html?id=${batchId}`;

        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.check()) window.location.href = 'login.html';
            CCP.initStage(batchId, stageNum);
            if (stageNum === 4) {
                document.getElementById('photoPromptText').innerText = 'Ambil Foto Label / Barcode Produk Akhir';
            }
        });

        document.getElementById('photoInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                const compressionStatus = document.getElementById('photoCompressionStatus');
                try {
                    files.forEach(file => API.validatePhoto(file));
                } catch (err) {
                    alert(err.message || 'Upload gagal');
                    e.target.value = '';
                    return;
                }
                if (compressionStatus) compressionStatus.textContent = 'Mengompres foto...';
                const preparedFiles = await CCP.preparePhotos(files);
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                    document.getElementById('uploadPrompt').style.display = 'none';
                    
                    const badge = document.getElementById('multiPhotoBadge');
                    if (preparedFiles.length > 1) {
                        badge.innerText = preparedFiles.length;
                        badge.style.display = 'flex';
                    } else {
                        badge.style.display = 'none';
                    }

                    if (stageNum === 2 || stageNum === 4) {
                        document.getElementById('ocrBtn').style.display = 'block';
                    }
                };
                reader.readAsDataURL(preparedFiles[0]);
                if (compressionStatus) {
                    const totalSize = preparedFiles.reduce((sum, item) => sum + (item.size || 0), 0);
                    compressionStatus.textContent = `Foto siap dikirim (${ImageCompression.formatBytes(totalSize)}).`;
                }
            }
        });

        document.getElementById('ocrBtn').addEventListener('click', async () => {
            const photo = CCP.selectedPhotos[0] || document.getElementById('photoInput').files[0];
            const btn = document.getElementById('ocrBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            
            try {
                const result = await CCP.runOCR(photo);
                CCP.applyOCR(result);
            } catch (err) {
                alert('OCR Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> Jalankan OCR (Ekstrak Teks)';
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Uploading...';

            try {
                const res = await CCP.submit(batchId, stageNum);
                if (res.success) {
                    alert('✓ Upload berhasil');
                    window.location.href = `batch_detail.html?id=${batchId}`;
                } else {
                    throw new Error(res.error || 'Upload gagal');
                }
            } catch (err) {
                alert('✕ Upload gagal: ' + err.message);
                btn.disabled = false;
                btn.innerText = 'Submit Inspection';
            }
        });
    </script>
</body>
</html>
