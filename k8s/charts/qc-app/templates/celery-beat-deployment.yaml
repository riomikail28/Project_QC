apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qc-app.fullname" . }}-beat
  labels:
    app.kubernetes.io/name: qc-app-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qc-app-beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qc-app-beat
    spec:
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["celery", "-A", "backend.workers.celery_app.celery_app", "beat", "--loglevel=info"]
          env:
            - name: REDIS_URL
              value: redis://{{ include "qc-app.fullname" . }}-redis:6379/0
            - name: DATABASE_URL
              value: postgresql://qc_user:{{ .Values.postgres.password }}@{{ include "qc-app.fullname" . }}-postgres:5432/qc_db
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
