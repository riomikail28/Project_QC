apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qc-app.fullname" . }}-redis
  labels:
    app.kubernetes.io/name: qc-app-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qc-app-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qc-app-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
