apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qc-app.fullname" . }}-postgres
spec:
  serviceName: {{ include "qc-app.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qc-app-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qc-app-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: qc_db
            - name: POSTGRES_USER
              value: qc_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "qc-app.fullname" . }}-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["/bin/sh","-c","pg_isready -U qc_user -d qc_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
