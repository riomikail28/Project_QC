replicaCount: 2

image:
  repository: rio/qc-backend
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

readinessProbe:
  path: /api/qc/health
  port: 5000
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  path: /api/qc/health
  port: 5000
  initialDelaySeconds: 30
  periodSeconds: 30

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: false
  hosts:
    - host: qc.example.com
      paths:
        - /

env:
  - name: FLASK_ENV
    value: production

pdb:
  minAvailable: 1
