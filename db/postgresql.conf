# Custom Postgres configuration for QC environment
# Enables WAL archiving to mounted directory /var/lib/postgresql/wal_archive

listen_addresses = '*'
port = 5432
max_connections = 100

# WAL settings for PITR
wal_level = replica
archive_mode = on
archive_command = 'wal-g wal-push %p'
archive_timeout = 60
archive_timeout = 3600
max_wal_size = 1GB
min_wal_size = 80MB
max_wal_senders = 3
wal_keep_size = 64MB

# Logging
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%a.log'
