[pytest]
# PyTest Configuration for QC Central Kitchen Project

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging
log_cli = false
log_level = INFO

# Markers for test organization
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests (deselect with '-m "not slow"')
    ci: tests that run in CI/CD pipeline

# Coverage options
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# Environment for testing
env =
    JWT_SECRET_KEY=ci-test-secret
    SUPABASE_URL=https://example.supabase.co
    SUPABASE_KEY=test-key
    ENVIRONMENT=testing

# Directories to ignore
norecursedirs =
    .git
    __pycache__
