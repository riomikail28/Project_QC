name: Full Restore Validate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0' # weekly on Sunday 07:00 UTC

jobs:
  restore-validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY && secrets.WALG_S3_PREFIX)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y wget docker.io tar gzip ca-certificates
          sudo systemctl start docker || true

      - name: Download wal-g
        run: |
          wget -qO- https://github.com/wal-g/wal-g/releases/download/v1.1/wal-g.linux-amd64.tar.gz | sudo tar -xz -C /usr/local/bin || true

      - name: Set env
        env:
          WALG_S3_PREFIX: ${{ secrets.WALG_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_RESTORE_PASSWORD }}
        run: |
          echo "WALG_S3_PREFIX=${WALG_S3_PREFIX}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_ENV
          echo "AWS_REGION=${AWS_REGION}" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> $GITHUB_ENV

      - name: Run full restore smoke test
        env:
          WALG_S3_PREFIX: ${{ secrets.WALG_S3_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_RESTORE_PASSWORD }}
        run: |
          chmod +x ./scripts/ci_full_restore.sh
          ./scripts/ci_full_restore.sh /tmp/ci_pgdata
