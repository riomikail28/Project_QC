name: QC Production CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qc-production-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax
        run: |
          python -m compileall api backend tests -q

      - name: Dependency import check
        env:
          JWT_SECRET_KEY: ci-test-secret
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: ci-test-key
        run: |
          python - <<'PY'
          from backend import create_app
          app = create_app()
          assert app is not None
          print("Flask app import OK")
          PY

  test:
    name: test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          JWT_SECRET_KEY: test-secret
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: test-key
        run: |
          python -m pytest tests -q

  vercel-deploy:
    name: vercel-deploy
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Vercel config
        run: |
          test -f vercel.json
          test -f api/app.py
          test -d frontend

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is not configured; skipping deploy."
            exit 0
          fi
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
