name: Backup Restore Verification

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  verify-restore:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY && secrets.WALG_S3_PREFIX)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y wget tar gzip ca-certificates

      - name: Download wal-g
        run: |
          wget -qO- https://github.com/wal-g/wal-g/releases/download/v1.1/wal-g.linux-amd64.tar.gz | tar -xz -C /usr/local/bin || true

      - name: Verify wal-g available
        run: wal-g --version

      - name: Configure env
        run: |
          echo "WALG_S3_PREFIX=${{ secrets.WALG_S3_PREFIX }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV

      - name: List available backups
        run: |
          wal-g backup-list || true

      - name: Fetch latest backup
        run: |
          mkdir -p /tmp/pg_restore
          wal-g backup-fetch /tmp/pg_restore LATEST

      - name: Check fetched files
        run: |
          ls -la /tmp/pg_restore
          test -n "$(ls -A /tmp/pg_restore)" || (echo "No files fetched" && exit 1)

      - name: Success message
        run: echo "Backup fetch succeeded"
