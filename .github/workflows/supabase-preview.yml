name: Supabase Preview

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  supabase-preview:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link to Supabase Project
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" -p "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Repair Missing Migration (Revert 025)
        run: |
          # Menghapus catatan migrasi 025 di remote agar tidak memicu error remote versions not found
          supabase migration repair --status reverted 025 || true

      - name: Deploy Database Migrations
        run: |
          supabase db push
