name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile backend
        env:
          JWT_SECRET_KEY: ci-test-secret
        run: |
          python -m compileall \
            backend/app.py \
            backend/__init__.py \
            backend/caching \
            backend/core \
            backend/database \
            backend/middleware \
            backend/notifications \
            backend/repositories \
            backend/routes \
            backend/service \
            backend/services \
            backend/skills \
            backend/workers

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/test_db
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET_KEY: ci-test-secret
          ENVIRONMENT: testing
        run: python -m pytest tests -q --ignore=tests/integration

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f backend/Dockerfile.optimized -t qc-app:${{ github.sha }} .

  helm-template:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint k8s/charts/qc-app

      - name: Render Helm chart
        run: |
          helm template qc-app k8s/charts/qc-app \
            --namespace qc-staging \
            --set image.repository=ghcr.io/example/qc-app \
            --set image.tag=${{ github.sha }} \
            --set secrets.jwtSecretKey=ci-test-secret \
            --set secrets.dbPassword=ci-db-password
