name: CI (DEPRECATED - Use ci-cd-production.yml)

# DEPRECATED NOTICE: This workflow is maintained for backward compatibility only.
# NEW WORKFLOWS should use: .github/workflows/ci-cd-production.yml
#
# This file remains active but is superseded by the production workflow.
# Kept for reference and to prevent accidental regressions.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  notify:
    name: Workflow Redirect Notice
    runs-on: ubuntu-latest
    steps:
      - name: Workflow deprecated
        run: |
          echo "::notice::This workflow (CI) is deprecated."
          echo "::notice::Please use: .github/workflows/ci-cd-production.yml"
          echo "::notice::The production workflow provides:"
          echo "  - Complete validation (syntax, imports, dependencies)"
          echo "  - Comprehensive testing (unit tests with coverage)"
          echo "  - Kubernetes validation (Helm + YAML)"
          echo "  - Docker multi-platform builds"
          echo "  - Staging & production deployments"
          echo "  - Better error visibility and logging"

  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        run: |
          python -m compileall \
            backend/app.py \
            backend/__init__.py \
            backend/caching \
            backend/core \
            backend/database \
            backend/middleware \
            backend/notifications \
            backend/repositories \
            backend/routes \
            backend/service \
            backend/skills \
            backend/workers

  test:
    name: Run Tests
    needs: validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/test_db
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET_KEY: ci-test-secret
          ENVIRONMENT: testing
        run: python -m pytest tests -q --ignore=tests/integration
