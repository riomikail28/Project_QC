name: Security Scans

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch:

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: python -m pip install --upgrade pip && pip install bandit

      - name: Run Bandit
        run: |
          bandit -r backend -lll -f json -o bandit-report.json || true

      - name: Check Bandit results
        run: |
          if [ ! -f bandit-report.json ]; then
            echo "Bandit report not found"
            exit 1
          fi
          HIGH_CRITICAL=$(jq '.results | map(.issues) | flatten | map(select(.severity == "HIGH" or .severity == "CRITICAL")) | length' bandit-report.json)
          if [ "$HIGH_CRITICAL" -gt 0 ]; then
            echo "Found $HIGH_CRITICAL high/critical Bandit issues. Failing build."
            jq '.results | map(.issues) | flatten | map(select(.severity == "HIGH" or .severity == "CRITICAL"))' bandit-report.json
            exit 1
          fi

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.9.2
        with:
          format: 'table'
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: 1

  zap:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    if: ${{ secrets.STAGING_URL && secrets.STAGING_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline scan against staging
        uses: zaproxy/action-baseline@v0.6.0
        with:
          target: ${{ secrets.STAGING_URL }}
          cmd_options: '-r zap_report.html'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html

      - name: Check ZAP results
        run: |
          if [ ! -f zap_report.html ]; then
            echo "ZAP report not found"
            exit 1
          fi
          # Simple check: look for High or Critical alerts in HTML
          HIGH_ALERTS=$(grep -c "High</td>" zap_report.html || true)
          CRITICAL_ALERTS=$(grep -c "Critical</td>" zap_report.html || true)
          TOTAL_HIGH_CRIT=$((HIGH_ALERTS + CRITICAL_ALERTS))
          if [ "$TOTAL_HIGH_CRIT" -gt 0 ]; then
            echo "Found $TOTAL_HIGH_CRIT high/critical ZAP alerts. Failing build."
            grep -A 5 -B 5 "High</td>\|Critical</td>" zap_report.html || true
            exit 1
          fi
