name: Load and Chaos Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 6' # weekly on Saturday 09:00 UTC

jobs:
  load-test:
    runs-on: ubuntu-latest
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q -O - https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Run k6 load test
        run: |
          k6 run scripts/load_test/k6_test.js

  chaos-test:
    needs: load-test
    if: ${{ secrets.ENABLE_CHAOS == 'true' && secrets.KUBE_CONFIG_DATA }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 --decode > kubeconfig
          mkdir -p $HOME/.kube
          mv kubeconfig $HOME/.kube/config
      - name: Run chaos script
        env:
          NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
        run: |
          chmod +x ./scripts/run_chaos.sh
          ./scripts/run_chaos.sh "$NAMESPACE" "app.kubernetes.io/name=qc-app" 
